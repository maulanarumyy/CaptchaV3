<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captcha</title>
    <script>
        let timer;
        let clickCount = 0;
        let timeout = 30000;  // 30 detik

        function startTimeout() {
            timer = setTimeout(function() {
                alert("You took too long to respond. Try again.");
                window.location.href = '/';
            }, timeout);
        }

        function resetTimeout() {
            clearTimeout(timer);
            startTimeout();
        }

        window.onload = function() {
            startTimeout();

            document.querySelectorAll('.captcha-image').forEach(img => {
                img.addEventListener('click', function() {
                    clickCount++;
                    fetch('/track-click', { method: 'POST' });
                    resetTimeout();
                });
            });
        };

        function checkForTimeout() {
            fetch('/check-timeout', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'timeout') {
                        alert('Session timed out due to inactivity.');
                        window.location.href = '/';
                    }
                });
        }

        setInterval(checkForTimeout, 5000);  // Cek timeout setiap 5 detik
    </script>
</head>
<body>
    <h1>Select the correct image for: {{ keyword }}</h1>
    <form method="POST" action="/validate">
        <input type="hidden" name="keyword" value="{{ keyword }}">
        <div>
            {% for image in images %}
                <label>
                    <input type="radio" name="image" value="{{ image }}">
                    <img src="{{ static }}" alt="{{ image }}" class="captcha-image">
                </label>
            {% endfor %}
        </div>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
